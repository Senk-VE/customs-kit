<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Customs Kit | Customs Declaration Tools</title>

    <link rel="stylesheet" href="./src/styles/style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link
      rel="icon"
      type="image/x-icon"
      href="/customs-kit/favicon/favicon.ico"
    />
  </head>

  <body>
    <header class="nav-container">
      <div class="nav-item nav-item-logo">
        <a href="index.html">Customs⚙️Kit</a>
      </div>

      <div class="nav-item nav-item-menu" id="nav-menu">
        <ul>
          <li><a href="calc.html">Расчет срока ИМ СД</a></li>
          <li><a href="currency.html">Конвертор валют СД</a></li>
          <li><a href="base64-converter.html">Извлечь файлы из XML</a></li>
          <li><a href="about.html">О приложении</a></li>
        </ul>
      </div>

      <div class="nav-item nav-item-toggle" id="nav-toggle">
        <div class="toggle-bar toggle-bar-top"></div>
        <div class="toggle-bar toggle-bar-middle"></div>
        <div class="toggle-bar toggle-bar-bottom"></div>
      </div>
    </header>

    <div class="container_02">
      <h1>Выберите XML</h1>

      <p class="desktop-hint">Или перетащите XML-файлы сюда</p>

      <input type="file" id="xmlInput" multiple hidden />

      <label for="xmlInput" class="file-button"> 📂 Выбрать XML-файлы </label>

      <div>
        <button id="parseBtn" class="hidden-btn">Скачать все</button>
        <button id="clearBtn" class="hidden-btn">Очистить</button>
      </div>
    </div>
    <div id="resultXml"></div>

    <!-- MODAL -->
    <div id="xmlModalOverlay" class="modal-overlay">
      <div class="modal-window">
        <div class="modal-header">
          <div>
            <div id="modalRegNumber" class="modal-title"></div>
            <div id="modalSender" class="modal-subtitle"></div>
            <div id="modalSummary" class="modal-summary"></div>
          </div>
        </div>

        <div class="modal-body">
          <table class="files-table">
            <thead>
              <tr>
                <th>№</th>
                <th>Имя PDF</th>
                <th>Размер</th>
                <th>Док</th>
                <th>Дата</th>
                <th>Код</th>
              </tr>
            </thead>
            <tbody id="modalFilesBody"></tbody>
          </table>
        </div>

        <div class="modal-footer">
          <button id="modalDownloadBtn">Скачать ZIP</button>
          <button id="modalCloseFooterBtn">Закрыть</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

    <script type="module" src="./src/js/core/toggle.js"></script>
    <script type="module" src="./src/js/pages/base64.js"></script>
  </body>
</html>
